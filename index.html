<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AETHER — Zero-Footprint 3D AI Engine</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

  <canvas id="grain-canvas"></canvas>

  <div id="hud">
    <div id="hud-logo">⬡ AETHER</div>
    <div id="hud-status">
      <span id="mood-label">MOOD: <strong id="mood-name">DEFAULT</strong></span>
      <div id="terminal-output" style="margin-top: 15px; font-family: monospace; color: #00eeff; font-size: 0.9em; line-height: 1.4; max-width: 350px; text-shadow: 0 0 5px #00eeff;">
        SYSTEM READY...
      </div>
    </div>
  </div>

  <div id="controls">
    <button class="mood-btn" id="btn-default" onclick="setMood('Default')">◈ DEFAULT</button>
    <button class="mood-btn" id="btn-discipline" onclick="setMood('Discipline')">◉ DISCIPLINE</button>
    <button class="mood-btn" id="btn-nostalgia" onclick="setMood('Nostalgia')">◎ NOSTALGIA</button>
  </div>

  <div id="scanlines"></div>

  <script>
  // ── CONFIGURATION ───────────────────────────
  const PIPEDREAM_URL = "https://eokta6nzy6c0t3m.m.pipedream.net/"; 

  // ── THREE.JS CORE ───────────────────────────
  const W = window.innerWidth, H = window.innerHeight;
  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x000814, 0.035);
  const camera = new THREE.PerspectiveCamera(60, W/H, 0.1, 300);
  camera.position.set(0, 3.5, 11);
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(W, H);
  renderer.setClearColor(0x000814);
  document.body.appendChild(renderer.domElement);

  // Lights & Orb (Your existing setup)
  const orbGroup = new THREE.Group();
  scene.add(orbGroup);
  const coreGeo = new THREE.SphereGeometry(0.72, 32, 32);
  const coreMat = new THREE.MeshStandardMaterial({ color: 0x00ccff, emissive: 0x00eeff, emissiveIntensity: 2.5 });
  const coreMesh = new THREE.Mesh(coreGeo, coreMat);
  orbGroup.add(coreMesh);
  
  const orbLight = new THREE.PointLight(0x00eeff, 4, 25);
  scene.add(orbLight);

  // ── AI INTEGRATION ──────────────────────────
  async function triggerAether(mood) {
    const output = document.getElementById('terminal-output');
    output.innerText = "> INITIALIZING UPLINK...";
    
    try {
      const response = await fetch(PIPEDREAM_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ mood: mood })
      });
      
      const aiResponse = await response.text();
      // Typewriter effect or instant reveal
      output.innerText = aiResponse;
    } catch (err) {
      output.innerText = "> ERROR: UPLINK FAILED.";
      console.error(err);
    }
  }

  // ── MOOD LOGIC ──────────────────────────────
  let moodState = {
    current: 'Default',
    rotSpeed: 0.0035,
    targetColor: new THREE.Color(0x00ccff),
    targetPulse: 0.4,
  };

  function setMood(mood) {
    document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
    moodState.current = mood;
    document.getElementById('mood-name').textContent = mood.toUpperCase();

    if (mood === 'Discipline') {
      document.getElementById('btn-discipline').classList.add('active');
      moodState.rotSpeed = 0.012;
      moodState.targetColor = new THREE.Color(0x0044ff);
      moodState.targetPulse = 0.65;
      document.body.classList.add('discipline');
      document.body.classList.remove('nostalgia');
    } else if (mood === 'Nostalgia') {
      document.getElementById('btn-nostalgia').classList.add('active');
      moodState.rotSpeed = 0.0008;
      moodState.targetColor = new THREE.Color(0xb06020);
      moodState.targetPulse = 0.18;
      document.body.classList.add('nostalgia');
      document.body.classList.remove('discipline');
    } else {
      document.getElementById('btn-default').classList.add('active');
      moodState.rotSpeed = 0.0035;
      moodState.targetColor = new THREE.Color(0x00ccff);
      moodState.targetPulse = 0.4;
      document.body.classList.remove('nostalgia', 'discipline');
    }

    // Call the AI
    triggerAether(mood);
  }

  // ── ANIMATION LOOP ──────────────────────────
  function animate() {
    requestAnimationFrame(animate);
    let time = Date.now() * 0.001;
    orbGroup.rotation.y += moodState.rotSpeed;
    coreMat.color.lerp(moodState.targetColor, 0.05);
    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
  });
  </script>
</body>
</html>
